stages:
  make_dataset:
    cmd: python src/data/make_dataset.py
    outs:
      - data/raw/dataset.csv
      - data/processed/train.csv
      - data/processed/test.csv
  validate:
    cmd: python src/validation/validate_data.py
    deps:
      - data/processed/train.csv
    outs:
      - reports/data_validation.json
  train:
    cmd: python src/training/train.py
    deps:
      - data/processed/train.csv
      - data/processed/test.csv
      - src/model_plugin/custom_model.py
    outs:
      - models/model.joblib
    metrics:
      - reports/metrics.json
  monitor:
    cmd: python src/monitoring/evidently_monitor.py && python src/monitoring/nannyml_alert.py
    deps:
      - data/processed/train.csv
      - data/processed/test.csv
    outs:
      - reports/evidently_report.html
      - reports/nannyml_alert.json
