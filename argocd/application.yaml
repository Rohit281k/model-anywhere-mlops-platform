apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-anywhere
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-user>/model-anywhere-mlops-platform.git
    targetRevision: main
    path: charts/model-anywhere
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
