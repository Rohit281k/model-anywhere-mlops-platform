apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-anywhere
  namespace: mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-anywhere
  template:
    metadata:
      labels:
        app: model-anywhere
    spec:
      containers:
        - name: api
          image: rohit1k/model-anywhere-mlops:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
